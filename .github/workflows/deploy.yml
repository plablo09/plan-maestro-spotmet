name: Deploy to Production

on:
  push:
    branches: [ main ]
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ghcr.io/${{ github.repository_owner }}/plan-maestro-spotmet:latest
          ghcr.io/${{ github.repository_owner }}/plan-maestro-spotmet:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Tailscale
      uses: tailscale/github-action@v2
      with:
        oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
        oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
        tags: tag:ci

    - name: Deploy via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          # Create app directory if it doesn't exist
          mkdir -p ~/apps/plan-maestro-spotmet
          cd ~/apps/plan-maestro-spotmet
          
          # Create a local .env file or production compose if needed
          # For this simple setup, we use the compose file from the repo
          # But we need to update the image tag to the latest
          
          cat <<EOF > docker-compose.yml
          version: '3.8'
          services:
            app:
              image: ghcr.io/${{ github.repository_owner }}/plan-maestro-spotmet:latest
              container_name: spotmet-app
              restart: always
              expose:
                - "8000"
              volumes:
                - ./data:/app/data
              networks:
                - gateway
          networks:
            gateway:
              external: true
          EOF

          # Pull the latest image and restart
          docker compose pull
          docker compose up -d
          
          # Optional: Clean up old images
          docker image prune -f
